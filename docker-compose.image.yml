# ============================================================
# 飞牛NAS台账系统 - 使用预构建Docker镜像（无需本地构建）
#
# 用法：将此文件内容替换 docker-compose.yml 中的内容
# 优点：无需安装git、无需本地构建，直接拉取镜像启动
# ============================================================

version: '3.8'

services:
  flybook-ledger:
    image: ghcr.io/chnmrlieu/ledger:latest
    container_name: flybook-ledger
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      # 核心数据（独立目录，与代码隔离）
      - /vol1/docker/flybook-data/db:/app/data
      - /vol1/docker/flybook-data/logs:/app/logs
      - /vol1/docker/flybook-data/backups:/app/backups
      # 热更新：代码挂载（可选，不挂载也能用，挂载后支持本地改代码热重载）
      # - ./app:/app/app
    environment:
      - TZ=Asia/Shanghai
      - FLASK_DEBUG=false
      - PORT=5000
      - DB_PATH=/app/data/ledger.db
      - BACKUP_DIR=/app/backups
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
